services:
  drone-sim:
    build:
      context: .
    working_dir: /workspace/Drone Sim
    volumes:
      - ..:/workspace
    tty: true
    stdin_open: true

  mavlink-bridge:
    image: python:3.11-slim
    working_dir: /workspace/MavLink/MavLink-Bridge
    volumes:
      - ..:/workspace
    command: ["python", "Bridge.py"]
    tty: true
    stdin_open: true

  mission-planner:
    image: mcr.microsoft.com/windows/servercore:ltsc2022
    profiles: ["windows"]
    volumes:
      - ..:/workspace
    command: ["cmd", "/c", "echo Mission Planner is included as a mounted project folder for packaging and review."]
