services:
  drone-sim:
    build:
      context: ./Godot-drone-master
    working_dir: /workspace
    volumes:
      - ./Godot-drone-master:/workspace
      - ./MavLink:/workspace/MavLink:ro
      - ./Mission Planner:/workspace/Mission Planner:ro
    command: ["godot", "--headless", "--path", "/workspace", "--verbose"]
    restart: unless-stopped
    tty: true
    stdin_open: true

  mavlink-bridge:
    build:
      context: ./MavLink/MavLink-Bridge
    working_dir: /app
    volumes:
      - ./MavLink/MavLink-Bridge:/app
      - ./Godot-drone-master:/workspace/Godot-drone-master:ro
      - ./Mission Planner:/workspace/Mission Planner:ro
    command: ["python", "Bridge.py"]
    tty: true
    stdin_open: true

  mission-planner:
    build:
      context: ./Mission Planner
    profiles: ["windows"]
    volumes:
      - ./Mission Planner:/workspace/Mission Planner
      - ./Godot-drone-master:/workspace/Godot-drone-master:ro
      - ./MavLink:/workspace/MavLink:ro
    command: ["cmd", "/c", "echo Mission Planner container image is built from the Mission Planner folder."]